<!DOCTYPE html>
<html>

<head>
    <title>Google Map App</title>
    <style>
        #map {
            height: 500px;
            width: 100%;
        }

        input,
        button {
            margin: 5px;
            padding: 8px;
        }
    </style>
</head>

<body>

    <h2>Google Map</h2>

    <input id="search" type="text" placeholder="Search place (Delhi)">
    <button onclick="searchPlace()">Search</button>
    <button onclick="getLocation()">My Location</button>

    <div id="map"></div>

    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places"></script>

    <script>
        let map, marker, directionsService, directionsRenderer;

        const business = { lat: 28.6139, lng: 77.2090 };

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: business,
                zoom: 12,
            });

            // Business marker
            const businessMarker = new google.maps.Marker({
                position: business,
                map: map,
                title: "My Business"
            });

            // Directions setup
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer();
            directionsRenderer.setMap(map);

            // Click → route
            businessMarker.addListener("click", () => {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const user = {
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude
                    };

                    directionsService.route({
                        origin: user,
                        destination: business,
                        travelMode: "DRIVING"
                    }, (result, status) => {
                        if (status === "OK") {
                            directionsRenderer.setDirections(result);
                        }
                    });
                });
            });
        }

        // Search place
        function searchPlace() {
            const input = document.getElementById("search").value;

            const service = new google.maps.places.PlacesService(map);

            service.findPlaceFromQuery({
                query: input,
                fields: ["name", "geometry"]
            }, (results, status) => {
                if (status === "OK" && results[0]) {
                    map.setCenter(results[0].geometry.location);

                    new google.maps.Marker({
                        map: map,
                        position: results[0].geometry.location
                    });
                }
            });
        }

        // Current location
        function getLocation() {
            navigator.geolocation.getCurrentPosition((pos) => {
                const user = {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude
                };

                map.setCenter(user);

                new google.maps.Marker({
                    position: user,
                    map: map,
                    title: "You are here"
                });
            });
        }

        window.onload = initMap;
    </script>

</body>

</html>
